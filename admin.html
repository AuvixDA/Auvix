<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Админка кейсов — AUVIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #181818;
    --white: #f0ede8; --gray: #5a5a5a; --accent: #c8f060; --border: #222222;
    --danger: #ff6b6b;
  }
  body {
    background: var(--bg); color: var(--white);
    font-family: 'Geologica', sans-serif; font-size: 15px;
    padding-bottom: 80px;
  }
  h1, h2, .brand { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
  a { color: var(--accent); }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10,10,10,0.97); z-index: 50;
  }
  .brand { font-size: 20px; }
  .brand span { color: var(--accent); }
  header nav { display: flex; gap: 16px; align-items: center; font-size: 13px; }
  header nav a, header nav button { color: var(--gray); text-decoration: none; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px; }

  /* LOGIN */
  #loginScreen { max-width: 360px; margin: 12vh auto; padding: 0 20px; }
  #loginScreen h1 { font-size: 34px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field input, .field textarea {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--white); padding: 12px 14px; font-size: 14px; font-family: inherit;
    border-radius: 2px;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field .hint { font-size: 12px; color: var(--gray); margin-top: 6px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #0a0a0a; border: none;
    padding: 12px 22px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    font-family: 'Geologica', sans-serif; border-radius: 2px;
  }
  .btn:hover { box-shadow: 0 6px 24px rgba(200,240,96,0.25); }
  .btn.secondary { background: var(--bg3); color: var(--white); border: 1px solid var(--border); }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn.small { padding: 8px 14px; font-size: 11px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #errorMsg { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* LIST */
  .case-row {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    background: var(--bg2); border: 1px solid var(--border);
    padding: 16px 18px; margin-bottom: 8px; border-radius: 2px;
  }
  .case-row-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 2px; flex-shrink: 0; background: var(--bg3); }
  .case-row-info { flex: 1; min-width: 0; }
  .case-row-title { font-size: 15px; }
  .case-row-meta { font-size: 12px; color: var(--gray); margin-top: 4px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }

  /* PHOTO GALLERY EDITOR */
  .gallery-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .gallery-item { position: relative; width: 110px; }
  .gallery-item img { width: 110px; height: 110px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); display: block; }
  .gallery-item .remove-photo {
    position: absolute; top: 4px; right: 4px;
    background: rgba(10,10,10,0.85); color: var(--danger);
    border: none; width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 12px; line-height: 1;
  }
  .gallery-item .move-btns { display: flex; justify-content: space-between; margin-top: 4px; }
  .gallery-item .move-btns button {
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray);
    font-size: 10px; padding: 3px 6px; cursor: pointer; border-radius: 2px;
  }
  .upload-status { font-size: 12px; color: var(--accent); margin: 6px 0 0; min-height: 16px; }

  .hidden { display: none !important; }

  footer { text-align: center; color: var(--gray); font-size: 12px; padding: 40px 20px 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1><span style="color:var(--accent)">A</span>UVIX — вход</h1>
  <div class="field">
    <label>Email</label>
    <input type="email" id="loginEmail" autocomplete="username">
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" id="loginPassword" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" style="width:100%; justify-content:center;">Войти</button>
  <div id="errorMsg"></div>
</div>

<!-- APP (виден только после входа) -->
<div id="app" class="hidden">
  <header>
    <a class="brand" href="index.html"><span>A</span>UVIX <span style="color:var(--gray); font-size:13px; letter-spacing:0;">/ admin</span></a>
    <nav>
      <a href="cases.html" target="_blank">Открыть сайт →</a>
      <button id="logoutBtn" class="btn secondary small">Выйти</button>
    </nav>
  </header>

  <div class="wrap">

    <!-- LIST VIEW -->
    <div id="listView">
      <div class="toolbar">
        <h2 style="font-size:26px;">Кейсы</h2>
        <button class="btn" id="newCaseBtn">+ Новый кейс</button>
      </div>
      <div id="casesList"></div>
      <div id="listEmptyMsg" class="hidden" style="color:var(--gray); font-size:14px; padding:20px 0;">
        Кейсов пока нет. Нажми «Новый кейс», чтобы добавить первый.
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editorView" class="hidden">
      <div class="toolbar">
        <h2 style="font-size:26px;" id="editorHeading">Новый кейс</h2>
        <button class="btn secondary small" id="backToListBtn">← К списку</button>
      </div>

      <div class="field">
        <label>Название</label>
        <input type="text" id="fTitle" placeholder="Например: GeraDog — TikTok с нуля">
        <div class="hint">Можно нажать Enter для переноса строки — так же, как на сайте.</div>
      </div>

      <div class="field">
        <label>Описание</label>
        <textarea id="fDescription" placeholder="Коротко: что за проект и что было сделано"></textarea>
      </div>

      <div class="field">
        <label>Фото</label>
        <div class="gallery-list" id="galleryList"></div>
        <input type="file" id="photoInput" accept="image/*" multiple>
        <div class="upload-status" id="uploadStatus"></div>
      </div>

      <div class="field">
        <label>Ссылка на проект (необязательно)</label>
        <input type="text" id="fLink" placeholder="https://...">
      </div>

      <div style="display:flex; gap:10px; margin-top:24px;">
        <button class="btn" id="saveCaseBtn">Сохранить кейс</button>
        <button class="btn danger hidden" id="deleteCaseBtn">Удалить кейс</button>
      </div>
      <div id="editorStatus" style="font-size:13px; color:var(--gray); margin-top:12px;"></div>
    </div>

  </div>

  <footer>AUVIX Studio · Внутренняя админка, не индексируется</footer>
</div>

<script type="module">
import {
  db, auth, collection, doc, getDocs, getDoc, addDoc, setDoc, deleteDoc, query, orderBy, serverTimestamp,
  signInWithEmailAndPassword, signOut, onAuthStateChanged, uploadImageToCloudinary
} from './firebase-init.js';

// ---------- AUTH ----------
const loginScreen = document.getElementById('loginScreen');
const appEl = document.getElementById('app');
const errorMsg = document.getElementById('errorMsg');

document.getElementById('loginBtn').addEventListener('click', async () => {
  errorMsg.textContent = '';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    errorMsg.textContent = 'Не удалось войти: проверь email и пароль.';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginScreen.classList.add('hidden');
    appEl.classList.remove('hidden');
    showListView();
  } else {
    loginScreen.classList.remove('hidden');
    appEl.classList.add('hidden');
  }
});

// ---------- STATE ----------
let currentImages = [];   // массив URL фото редактируемого кейса
let editingCaseId = null; // null = новый кейс

// ---------- VIEW SWITCH ----------
function showListView() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('editorView').classList.add('hidden');
  loadCasesList();
}
function showEditorView() {
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('editorView').classList.remove('hidden');
}
document.getElementById('backToListBtn').addEventListener('click', showListView);

// ---------- LIST ----------
async function loadCasesList() {
  const listEl = document.getElementById('casesList');
  const emptyEl = document.getElementById('listEmptyMsg');
  listEl.innerHTML = '<div style="color:var(--gray); font-size:13px;">Загрузка…</div>';
  const q = query(collection(db, 'cases'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  listEl.innerHTML = '';
  if (snap.empty) {
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');
  snap.forEach(docSnap => {
    const d = docSnap.data();
    const thumb = (d.images && d.images[0]) || '';
    const row = document.createElement('div');
    row.className = 'case-row';
    row.innerHTML = `
      ${thumb ? `<img class="case-row-thumb" src="${escapeAttr(thumb)}">` : `<div class="case-row-thumb"></div>`}
      <div class="case-row-info">
        <div class="case-row-title">${escapeText((d.title || '').replace(/\n/g, ' '))}</div>
        <div class="case-row-meta">${(d.images || []).length} фото${d.link ? ' · есть ссылка' : ''}</div>
      </div>
      <button class="btn secondary small" data-edit="${docSnap.id}">Редактировать</button>`;
    listEl.appendChild(row);
  });
  listEl.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openEditor(btn.dataset.edit));
  });
}

document.getElementById('newCaseBtn').addEventListener('click', () => openEditor(null));

// ---------- EDITOR ----------
async function openEditor(caseId) {
  editingCaseId = caseId;
  document.getElementById('editorStatus').textContent = '';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('deleteCaseBtn').classList.toggle('hidden', !caseId);
  document.getElementById('photoInput').value = '';

  if (caseId) {
    document.getElementById('editorHeading').textContent = 'Редактировать кейс';
    const snap = await getDoc(doc(db, 'cases', caseId));
    const d = snap.data();
    document.getElementById('fTitle').value = d.title || '';
    document.getElementById('fDescription').value = d.description || '';
    document.getElementById('fLink').value = d.link || '';
    currentImages = [...(d.images || [])];
  } else {
    document.getElementById('editorHeading').textContent = 'Новый кейс';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDescription').value = '';
    document.getElementById('fLink').value = '';
    currentImages = [];
  }
  renderGallery();
  showEditorView();
}

function renderGallery() {
  const galleryEl = document.getElementById('galleryList');
  galleryEl.innerHTML = currentImages.map((url, i) => `
    <div class="gallery-item">
      <img src="${escapeAttr(url)}">
      <button class="remove-photo" data-remove="${i}" title="Удалить фото">✕</button>
      <div class="move-btns">
        <button data-move-left="${i}">←</button>
        <button data-move-right="${i}">→</button>
      </div>
    </div>`).join('');

  galleryEl.querySelectorAll('[data-remove]').forEach(b => b.addEventListener('click', () => {
    currentImages.splice(+b.dataset.remove, 1); renderGallery();
  }));
  galleryEl.querySelectorAll('[data-move-left]').forEach(b => b.addEventListener('click', () => {
    const i = +b.dataset.moveLeft;
    if (i > 0) { [currentImages[i-1], currentImages[i]] = [currentImages[i], currentImages[i-1]]; renderGallery(); }
  }));
  galleryEl.querySelectorAll('[data-move-right]').forEach(b => b.addEventListener('click', () => {
    const i = +b.dataset.moveRight;
    if (i < currentImages.length - 1) { [currentImages[i+1], currentImages[i]] = [currentImages[i], currentImages[i+1]]; renderGallery(); }
  }));
}

document.getElementById('photoInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const statusEl = document.getElementById('uploadStatus');
  for (let i = 0; i < files.length; i++) {
    statusEl.textContent = `Загружаю фото ${i + 1} из ${files.length}…`;
    try {
      const url = await uploadImageToCloudinary(files[i]);
      currentImages.push(url);
      renderGallery();
    } catch (err) {
      statusEl.textContent = 'Ошибка загрузки: ' + err.message;
      return;
    }
  }
  statusEl.textContent = 'Загружено ✓';
  e.target.value = '';
});

function escapeAttr(str) {
  return (str || '').toString().replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}
function escapeText(str) {
  return (str || '').toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---------- SAVE / DELETE ----------
document.getElementById('saveCaseBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('editorStatus');
  const title = document.getElementById('fTitle').value.trim();
  if (!title) {
    statusEl.textContent = 'Заполни название кейса.';
    return;
  }
  const payload = {
    title,
    description: document.getElementById('fDescription').value.trim(),
    link: document.getElementById('fLink').value.trim(),
    images: currentImages,
    updatedAt: serverTimestamp()
  };
  statusEl.textContent = 'Сохраняю…';
  try {
    if (editingCaseId) {
      await setDoc(doc(db, 'cases', editingCaseId), payload, { merge: true });
    } else {
      payload.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db, 'cases'), payload);
      editingCaseId = ref.id;
    }
    statusEl.textContent = 'Сохранено ✓';
    setTimeout(showListView, 500);
  } catch (e) {
    statusEl.textContent = 'Ошибка сохранения: ' + e.message;
  }
});

document.getElementById('deleteCaseBtn').addEventListener('click', async () => {
  if (!editingCaseId) return;
  if (!confirm('Удалить этот кейс навсегда?')) return;
  await deleteDoc(doc(db, 'cases', editingCaseId));
  showListView();
});
</script>
</body>
</html>
