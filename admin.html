<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Админка кейсов — AUVIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #181818;
    --white: #f0ede8; --gray: #5a5a5a; --accent: #c8f060; --border: #222222;
    --danger: #ff6b6b;
  }
  body {
    background: var(--bg); color: var(--white);
    font-family: 'Geologica', sans-serif; font-size: 15px;
    padding-bottom: 80px;
  }
  h1, h2, .brand { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
  a { color: var(--accent); }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10,10,10,0.97); z-index: 50;
  }
  .brand { font-size: 20px; }
  .brand span { color: var(--accent); }
  header nav { display: flex; gap: 16px; align-items: center; font-size: 13px; }
  header nav a, header nav button { color: var(--gray); text-decoration: none; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px; }

  /* LOGIN */
  #loginScreen { max-width: 360px; margin: 12vh auto; padding: 0 20px; }
  #loginScreen h1 { font-size: 34px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--white); padding: 12px 14px; font-size: 14px; font-family: inherit;
    border-radius: 2px;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #0a0a0a; border: none;
    padding: 12px 22px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    font-family: 'Geologica', sans-serif; border-radius: 2px;
  }
  .btn:hover { box-shadow: 0 6px 24px rgba(200,240,96,0.25); }
  .btn.secondary { background: var(--bg3); color: var(--white); border: 1px solid var(--border); }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn.small { padding: 8px 14px; font-size: 11px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #errorMsg { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* LIST */
  .case-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg2); border: 1px solid var(--border);
    padding: 16px 18px; margin-bottom: 8px; border-radius: 2px;
  }
  .case-row-title { font-size: 15px; }
  .case-row-meta { font-size: 12px; color: var(--gray); margin-top: 4px; }
  .case-row-actions { display: flex; gap: 8px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }

  /* BLOCK EDITOR */
  .block-card {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 18px; margin-bottom: 14px; border-radius: 2px;
  }
  .block-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .block-type-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
  }
  .block-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray);
    cursor: pointer; padding: 5px 9px; font-size: 12px; border-radius: 2px;
  }
  .icon-btn:hover { color: var(--white); }

  .item-row { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 10px; background: var(--bg3); border-radius: 2px; margin-bottom: 8px; }
  .item-row-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .item-row-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray); }

  .img-preview { max-width: 100%; max-height: 160px; display: block; margin-top: 8px; border: 1px solid var(--border); }
  .upload-status { font-size: 12px; color: var(--accent); margin-top: 6px; }

  .add-block-row { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; }

  .section-title { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin: 24px 0 10px; }

  .hidden { display: none !important; }

  footer { text-align: center; color: var(--gray); font-size: 12px; padding: 40px 20px 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1><span style="color:var(--accent)">A</span>UVIX — вход</h1>
  <div class="field">
    <label>Email</label>
    <input type="email" id="loginEmail" autocomplete="username">
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" id="loginPassword" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" style="width:100%; justify-content:center;">Войти</button>
  <div id="errorMsg"></div>
</div>

<!-- APP (виден только после входа) -->
<div id="app" class="hidden">
  <header>
    <a class="brand" href="index.html"><span>A</span>UVIX <span style="color:var(--gray); font-size:13px; letter-spacing:0;">/ admin</span></a>
    <nav>
      <a href="cases.html" target="_blank">Открыть сайт →</a>
      <button id="logoutBtn" class="btn secondary small">Выйти</button>
    </nav>
  </header>

  <div class="wrap">

    <!-- LIST VIEW -->
    <div id="listView">
      <div class="toolbar">
        <h2 style="font-size:26px;">Кейсы</h2>
        <div style="display:flex; gap:8px;">
          <button class="btn secondary" id="importDemoBtn">Импортировать 3 демо-кейса</button>
          <button class="btn" id="newCaseBtn">+ Новый кейс</button>
        </div>
      </div>
      <div id="casesList"></div>
      <div id="listEmptyMsg" class="hidden" style="color:var(--gray); font-size:14px; padding:20px 0;">
        Кейсов пока нет. Нажми «Новый кейс» или импортируй демо-кейсы.
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editorView" class="hidden">
      <div class="toolbar">
        <h2 style="font-size:26px;" id="editorHeading">Новый кейс</h2>
        <button class="btn secondary small" id="backToListBtn">← К списку</button>
      </div>

      <div class="section-title">Основное</div>
      <div class="item-row-grid3">
        <div class="field"><label>Порядок (число, меньше — выше)</label><input type="number" id="fOrder" value="1"></div>
        <div class="field"><label>Номер раздела</label><input type="text" id="fSectionNumber" placeholder="01"></div>
        <div class="field"><label>Тип раздела</label><input type="text" id="fSectionType" placeholder="TikTok / SMM / Веб-разработка"></div>
      </div>
      <div class="field">
        <label>Тег категории (маленькая строка над заголовком)</label>
        <input type="text" id="fCategoryTag" placeholder="TikTok · Pets · Органический рост">
      </div>
      <div class="field">
        <label>Заголовок (Enter — перенос строки, как на сайте)</label>
        <textarea id="fTitle" placeholder="GeraDog —&#10;TikTok с нуля"></textarea>
      </div>
      <div class="field">
        <label>Описание</label>
        <textarea id="fDescription"></textarea>
      </div>

      <div class="section-title">Блоки кейса (в порядке отображения)</div>
      <div id="blocksContainer"></div>

      <div class="add-block-row">
        <button class="btn secondary small" data-add-block="image">+ Фото</button>
        <button class="btn secondary small" data-add-block="stats">+ Статистика</button>
        <button class="btn secondary small" data-add-block="doneList">+ Список работ</button>
        <button class="btn secondary small" data-add-block="problemSolution">+ Проблема/Решение</button>
        <button class="btn secondary small" data-add-block="sitePreview">+ Превью сайта</button>
      </div>

      <div style="display:flex; gap:10px; margin-top:24px;">
        <button class="btn" id="saveCaseBtn">Сохранить кейс</button>
        <button class="btn danger hidden" id="deleteCaseBtn">Удалить кейс</button>
      </div>
      <div id="editorStatus" style="font-size:13px; color:var(--gray); margin-top:12px;"></div>
    </div>

  </div>

  <footer>AUVIX Studio · Внутренняя админка, не индексируется</footer>
</div>

<script type="module">
import {
  db, auth, collection, doc, getDocs, getDoc, addDoc, setDoc, deleteDoc, query, orderBy, serverTimestamp,
  signInWithEmailAndPassword, signOut, onAuthStateChanged, uploadImageToCloudinary
} from './firebase-init.js';

// ---------- AUTH ----------
const loginScreen = document.getElementById('loginScreen');
const appEl = document.getElementById('app');
const errorMsg = document.getElementById('errorMsg');

document.getElementById('loginBtn').addEventListener('click', async () => {
  errorMsg.textContent = '';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    errorMsg.textContent = 'Не удалось войти: проверь email и пароль.';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginScreen.classList.add('hidden');
    appEl.classList.remove('hidden');
    showListView();
  } else {
    loginScreen.classList.remove('hidden');
    appEl.classList.add('hidden');
  }
});

// ---------- STATE ----------
let currentBlocks = [];   // блоки редактируемого кейса
let editingCaseId = null; // null = новый кейс

// ---------- VIEW SWITCH ----------
function showListView() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('editorView').classList.add('hidden');
  loadCasesList();
}
function showEditorView() {
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('editorView').classList.remove('hidden');
}
document.getElementById('backToListBtn').addEventListener('click', showListView);

// ---------- LIST ----------
async function loadCasesList() {
  const listEl = document.getElementById('casesList');
  const emptyEl = document.getElementById('listEmptyMsg');
  listEl.innerHTML = '<div style="color:var(--gray); font-size:13px;">Загрузка…</div>';
  const q = query(collection(db, 'cases'), orderBy('order', 'asc'));
  const snap = await getDocs(q);
  listEl.innerHTML = '';
  if (snap.empty) {
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');
  snap.forEach(docSnap => {
    const d = docSnap.data();
    const row = document.createElement('div');
    row.className = 'case-row';
    row.innerHTML = `
      <div>
        <div class="case-row-title">${(d.title || '').replace(/\n/g, ' ')}</div>
        <div class="case-row-meta">#${d.order ?? '?'} · ${d.sectionNumber || ''} — ${d.sectionType || ''}</div>
      </div>
      <div class="case-row-actions">
        <button class="btn secondary small" data-edit="${docSnap.id}">Редактировать</button>
      </div>`;
    listEl.appendChild(row);
  });
  listEl.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openEditor(btn.dataset.edit));
  });
}

document.getElementById('newCaseBtn').addEventListener('click', () => openEditor(null));

// ---------- IMPORT DEMO CASES ----------
document.getElementById('importDemoBtn').addEventListener('click', async () => {
  if (!confirm('Импортировать 3 исходных кейса (GeraDog, Опера, TempesT) в базу? Существующие фото при этом останутся на прежних ссылках (jpg-файлы в репозитории).')) return;
  const btn = document.getElementById('importDemoBtn');
  btn.disabled = true; btn.textContent = 'Импортирую…';
  try {
    for (const c of DEMO_CASES) {
      await addDoc(collection(db, 'cases'), { ...c, createdAt: serverTimestamp() });
    }
    alert('Готово! Демо-кейсы добавлены.');
    loadCasesList();
  } catch (e) {
    alert('Ошибка импорта: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Импортировать 3 демо-кейса';
  }
});

// ---------- EDITOR ----------
async function openEditor(caseId) {
  editingCaseId = caseId;
  document.getElementById('editorStatus').textContent = '';
  document.getElementById('deleteCaseBtn').classList.toggle('hidden', !caseId);

  if (caseId) {
    document.getElementById('editorHeading').textContent = 'Редактировать кейс';
    const snap = await getDoc(doc(db, 'cases', caseId));
    const d = snap.data();
    document.getElementById('fOrder').value = d.order ?? 1;
    document.getElementById('fSectionNumber').value = d.sectionNumber || '';
    document.getElementById('fSectionType').value = d.sectionType || '';
    document.getElementById('fCategoryTag').value = d.categoryTag || '';
    document.getElementById('fTitle').value = d.title || '';
    document.getElementById('fDescription').value = d.description || '';
    currentBlocks = JSON.parse(JSON.stringify(d.blocks || []));
  } else {
    document.getElementById('editorHeading').textContent = 'Новый кейс';
    document.getElementById('fOrder').value = 1;
    document.getElementById('fSectionNumber').value = '';
    document.getElementById('fSectionType').value = '';
    document.getElementById('fCategoryTag').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDescription').value = '';
    currentBlocks = [];
  }
  renderBlocksEditor();
  showEditorView();
}

document.querySelectorAll('[data-add-block]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.addBlock;
    currentBlocks.push(defaultBlock(type));
    renderBlocksEditor();
  });
});

function defaultBlock(type) {
  switch (type) {
    case 'image': return { type: 'image', url: '', alt: '' };
    case 'stats': return { type: 'stats', items: [{ value: '', label: '', growth: '' }] };
    case 'doneList': return { type: 'doneList', items: [{ title: '', sub: '' }] };
    case 'problemSolution': return { type: 'problemSolution', problem: [{ title: '', text: '' }], solution: [{ title: '', text: '' }] };
    case 'sitePreview': return { type: 'sitePreview', url: '', image: '', alt: '' };
  }
}

const BLOCK_LABELS = {
  image: 'Фото', stats: 'Статистика', doneList: 'Список работ',
  problemSolution: 'Проблема / Решение', sitePreview: 'Превью сайта'
};

function renderBlocksEditor() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';
  currentBlocks.forEach((block, index) => {
    const card = document.createElement('div');
    card.className = 'block-card';
    card.innerHTML = `
      <div class="block-card-head">
        <span class="block-type-label">${BLOCK_LABELS[block.type]}</span>
        <div class="block-actions">
          <button class="icon-btn" data-move-up="${index}">↑</button>
          <button class="icon-btn" data-move-down="${index}">↓</button>
          <button class="icon-btn" data-remove-block="${index}" style="color:var(--danger)">✕</button>
        </div>
      </div>
      <div class="block-body" data-block-body="${index}"></div>
    `;
    container.appendChild(card);
    renderBlockBody(card.querySelector('[data-block-body]'), block, index);
  });

  container.querySelectorAll('[data-move-up]').forEach(b => b.addEventListener('click', () => {
    const i = +b.dataset.moveUp;
    if (i > 0) { [currentBlocks[i-1], currentBlocks[i]] = [currentBlocks[i], currentBlocks[i-1]]; renderBlocksEditor(); }
  }));
  container.querySelectorAll('[data-move-down]').forEach(b => b.addEventListener('click', () => {
    const i = +b.dataset.moveDown;
    if (i < currentBlocks.length - 1) { [currentBlocks[i+1], currentBlocks[i]] = [currentBlocks[i], currentBlocks[i+1]]; renderBlocksEditor(); }
  }));
  container.querySelectorAll('[data-remove-block]').forEach(b => b.addEventListener('click', () => {
    currentBlocks.splice(+b.dataset.removeBlock, 1); renderBlocksEditor();
  }));
}

function renderBlockBody(el, block, index) {
  if (block.type === 'image') {
    el.innerHTML = `
      <div class="field"><label>Alt-текст (описание фото)</label><input type="text" data-field="alt" value="${escapeAttr(block.alt)}"></div>
      <div class="field"><label>Файл</label><input type="file" accept="image/*" data-upload="url"></div>
      <div class="upload-status" data-upload-status></div>
      ${block.url ? `<img class="img-preview" src="${escapeAttr(block.url)}">` : ''}
    `;
    el.querySelector('[data-field="alt"]').addEventListener('input', e => { block.alt = e.target.value; });
    bindImageUpload(el, block, 'url', index);
  }

  if (block.type === 'stats') {
    el.innerHTML = `<div data-items></div><button class="btn secondary small" data-add-item>+ Показатель</button>`;
    const itemsEl = el.querySelector('[data-items]');
    const draw = () => {
      itemsEl.innerHTML = block.items.map((it, i) => `
        <div class="item-row">
          <div class="item-row-grid3">
            <input type="text" placeholder="Значение (800K)" data-i="${i}" data-k="value" value="${escapeAttr(it.value)}">
            <input type="text" placeholder="Подпись" data-i="${i}" data-k="label" value="${escapeAttr(it.label)}">
            <input type="text" placeholder="Рост (+688%), необязательно" data-i="${i}" data-k="growth" value="${escapeAttr(it.growth)}">
          </div>
          <div class="checkbox-row">
            <label><input type="checkbox" data-i="${i}" data-k="wide" ${it.wide ? 'checked' : ''}> На всю ширину</label>
            <button class="icon-btn" data-remove-item="${i}" style="margin-left:auto; color:var(--danger)">✕</button>
          </div>
        </div>`).join('');
      itemsEl.querySelectorAll('input[data-k]').forEach(inp => {
        inp.addEventListener('input', () => {
          const i = +inp.dataset.i, k = inp.dataset.k;
          block.items[i][k] = inp.type === 'checkbox' ? inp.checked : inp.value;
        });
      });
      itemsEl.querySelectorAll('[data-remove-item]').forEach(b => b.addEventListener('click', () => {
        block.items.splice(+b.dataset.removeItem, 1); draw();
      }));
    };
    draw();
    el.querySelector('[data-add-item]').addEventListener('click', () => {
      block.items.push({ value: '', label: '', growth: '' }); draw();
    });
  }

  if (block.type === 'doneList') {
    el.innerHTML = `<div data-items></div><button class="btn secondary small" data-add-item>+ Пункт</button>`;
    const itemsEl = el.querySelector('[data-items]');
    const draw = () => {
      itemsEl.innerHTML = block.items.map((it, i) => `
        <div class="item-row">
          <input type="text" placeholder="Заголовок пункта" data-i="${i}" data-k="title" value="${escapeAttr(it.title)}">
          <input type="text" placeholder="Пояснение (необязательно)" data-i="${i}" data-k="sub" value="${escapeAttr(it.sub)}">
          <button class="icon-btn" data-remove-item="${i}" style="align-self:flex-end; color:var(--danger)">✕ Удалить пункт</button>
        </div>`).join('');
      itemsEl.querySelectorAll('input[data-k]').forEach(inp => {
        inp.addEventListener('input', () => { block.items[+inp.dataset.i][inp.dataset.k] = inp.value; });
      });
      itemsEl.querySelectorAll('[data-remove-item]').forEach(b => b.addEventListener('click', () => {
        block.items.splice(+b.dataset.removeItem, 1); draw();
      }));
    };
    draw();
    el.querySelector('[data-add-item]').addEventListener('click', () => {
      block.items.push({ title: '', sub: '' }); draw();
    });
  }

  if (block.type === 'problemSolution') {
    el.innerHTML = `
      <div class="section-title" style="margin-top:0;">Проблема</div>
      <div data-items="problem"></div>
      <button class="btn secondary small" data-add-item="problem">+ Пункт проблемы</button>
      <div class="section-title">Решение</div>
      <div data-items="solution"></div>
      <button class="btn secondary small" data-add-item="solution">+ Пункт решения</button>
    `;
    const drawCol = (col) => {
      const itemsEl = el.querySelector(`[data-items="${col}"]`);
      itemsEl.innerHTML = block[col].map((it, i) => `
        <div class="item-row">
          <input type="text" placeholder="Заголовок" data-col="${col}" data-i="${i}" data-k="title" value="${escapeAttr(it.title)}">
          <input type="text" placeholder="Текст" data-col="${col}" data-i="${i}" data-k="text" value="${escapeAttr(it.text)}">
          <button class="icon-btn" data-remove-item="${col}:${i}" style="align-self:flex-end; color:var(--danger)">✕ Удалить</button>
        </div>`).join('');
      itemsEl.querySelectorAll('input[data-k]').forEach(inp => {
        inp.addEventListener('input', () => { block[inp.dataset.col][+inp.dataset.i][inp.dataset.k] = inp.value; });
      });
      itemsEl.querySelectorAll('[data-remove-item]').forEach(b => b.addEventListener('click', () => {
        const [c, i] = b.dataset.removeItem.split(':');
        block[c].splice(+i, 1); drawCol(c);
      }));
    };
    drawCol('problem'); drawCol('solution');
    el.querySelectorAll('[data-add-item]').forEach(b => b.addEventListener('click', () => {
      block[b.dataset.addItem].push({ title: '', text: '' }); drawCol(b.dataset.addItem);
    }));
  }

  if (block.type === 'sitePreview') {
    el.innerHTML = `
      <div class="field"><label>URL, показываемый в адресной строке макета</label><input type="text" data-field="url" value="${escapeAttr(block.url)}"></div>
      <div class="field"><label>Alt-текст</label><input type="text" data-field="alt" value="${escapeAttr(block.alt)}"></div>
      <div class="field"><label>Скриншот</label><input type="file" accept="image/*" data-upload="image"></div>
      <div class="upload-status" data-upload-status></div>
      ${block.image ? `<img class="img-preview" src="${escapeAttr(block.image)}">` : ''}
    `;
    el.querySelectorAll('[data-field]').forEach(inp => {
      inp.addEventListener('input', () => { block[inp.dataset.field] = inp.value; });
    });
    bindImageUpload(el, block, 'image', index);
  }
}

function bindImageUpload(el, block, field, index) {
  const input = el.querySelector('[data-upload]');
  if (!input) return;
  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;
    const statusEl = el.querySelector('[data-upload-status]');
    statusEl.textContent = 'Загружаю фото…';
    try {
      const url = await uploadImageToCloudinary(file);
      block[field] = url;
      statusEl.textContent = 'Загружено ✓';
      renderBlockBody(el, block, index);
    } catch (e) {
      statusEl.textContent = 'Ошибка загрузки: ' + e.message;
    }
  });
}

function escapeAttr(str) {
  return (str || '').toString().replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// ---------- SAVE / DELETE ----------
document.getElementById('saveCaseBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('editorStatus');
  const payload = {
    order: Number(document.getElementById('fOrder').value) || 0,
    sectionNumber: document.getElementById('fSectionNumber').value.trim(),
    sectionType: document.getElementById('fSectionType').value.trim(),
    categoryTag: document.getElementById('fCategoryTag').value.trim(),
    title: document.getElementById('fTitle').value,
    description: document.getElementById('fDescription').value.trim(),
    blocks: currentBlocks,
    updatedAt: serverTimestamp()
  };
  statusEl.textContent = 'Сохраняю…';
  try {
    if (editingCaseId) {
      await setDoc(doc(db, 'cases', editingCaseId), payload, { merge: true });
    } else {
      payload.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db, 'cases'), payload);
      editingCaseId = ref.id;
    }
    statusEl.textContent = 'Сохранено ✓';
    setTimeout(showListView, 500);
  } catch (e) {
    statusEl.textContent = 'Ошибка сохранения: ' + e.message;
  }
});

document.getElementById('deleteCaseBtn').addEventListener('click', async () => {
  if (!editingCaseId) return;
  if (!confirm('Удалить этот кейс навсегда?')) return;
  await deleteDoc(doc(db, 'cases', editingCaseId));
  showListView();
});
</script>
